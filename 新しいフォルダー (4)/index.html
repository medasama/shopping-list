<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2d5a4a">
<title>買い物リスト</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="買い物リスト">
<style>
  :root{
    --bg:#f7f5f0;
    --card:#ffffff;
    --ink:#2b2b26;
    --ink-soft:#7a7a72;
    --accent:#2d5a4a;
    --accent-soft:#e4ede9;
    --line:#e8e5dd;
    --danger:#b5544a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:calc(env(safe-area-inset-top) + 20px) 20px 16px;
    background:var(--accent);
    color:#fff;
    position:sticky;
    top:0;
    z-index:10;
  }
  header h1{
    margin:0;
    font-size:20px;
    font-weight:600;
    letter-spacing:0.02em;
  }
  header p{
    margin:4px 0 0;
    font-size:12px;
    opacity:0.75;
  }
  .container{
    max-width:520px;
    margin:0 auto;
    padding:16px;
  }
  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .add-row input[type=text]{
    flex:1;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:12px;
    font-size:16px;
    background:var(--card);
    color:var(--ink);
  }
  .add-row input[type=text]:focus{
    outline:none;
    border-color:var(--accent);
  }
  .add-row button{
    padding:0 18px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
  }
  .add-row button:active{opacity:0.8;}

  .category-tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    margin-bottom:14px;
    padding-bottom:2px;
  }
  .category-tabs::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex:0 0 auto;
    padding:6px 12px;
    border-radius:999px;
    background:var(--card);
    border:1px solid var(--line);
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
  }
  .cat-chip.active{
    background:var(--accent-soft);
    border-color:var(--accent);
    color:var(--accent);
    font-weight:600;
  }

  ul.list{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  li.item{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
  }
  li.item.checked{
    opacity:0.5;
  }
  .checkbox{
    width:22px;
    height:22px;
    border-radius:7px;
    border:2px solid var(--accent);
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .checkbox svg{display:none; width:14px; height:14px;}
  li.item.checked .checkbox{background:var(--accent);}
  li.item.checked .checkbox svg{display:block;}
  .item-name{
    flex:1;
    font-size:15px;
    line-height:1.4;
    word-break:break-word;
  }
  li.item.checked .item-name{
    text-decoration:line-through;
    color:var(--ink-soft);
  }
  .item-cat{
    font-size:11px;
    color:var(--ink-soft);
    background:var(--bg);
    padding:2px 8px;
    border-radius:999px;
    flex:0 0 auto;
  }
  .del-btn{
    flex:0 0 auto;
    border:none;
    background:none;
    color:var(--ink-soft);
    font-size:18px;
    cursor:pointer;
    padding:4px 6px;
    line-height:1;
  }
  .del-btn:active{color:var(--danger);}

  .empty{
    text-align:center;
    color:var(--ink-soft);
    padding:60px 20px;
    font-size:14px;
  }

  .footer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
    padding-top:14px;
    border-top:1px solid var(--line);
    font-size:13px;
    color:var(--ink-soft);
  }
  .footer-row button{
    border:none;
    background:none;
    color:var(--danger);
    font-size:13px;
    cursor:pointer;
    padding:4px;
  }
  .install-banner{
    display:none;
    max-width:520px;
    margin:0 auto 14px;
    background:var(--accent-soft);
    color:var(--accent);
    border-radius:12px;
    padding:12px 14px;
    font-size:13px;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .install-banner button{
    border:none;
    background:var(--accent);
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    flex:0 0 auto;
  }
</style>
</head>
<body>
<header>
  <h1>🛒 買い物リスト</h1>
  <p>タップして完了チェック・オフラインでも使えます</p>
</header>

<div class="container">
  <div class="install-banner" id="installBanner">
    <span>ホーム画面に追加してアプリのように使えます</span>
    <button id="installBtn">追加</button>
  </div>

  <div class="add-row">
    <input type="text" id="itemInput" placeholder="例：牛乳、玉ねぎ..." autocomplete="off">
    <button id="addBtn">追加</button>
  </div>

  <div class="category-tabs" id="categoryTabs"></div>

  <ul class="list" id="list"></ul>
  <div class="empty" id="emptyMsg" style="display:none;">リストは空です。上から追加してください。</div>

  <div class="footer-row">
    <span id="countText">0件</span>
    <button id="clearCheckedBtn">完了済みを削除</button>
  </div>
</div>

<script>
  const CATEGORIES = ['食品','日用品','その他'];
  const STORAGE_KEY = 'shoppingListItems_v1';

  let items = loadItems();
  let activeCategory = 'すべて';

  const listEl = document.getElementById('list');
  const emptyMsg = document.getElementById('emptyMsg');
  const countText = document.getElementById('countText');
  const itemInput = document.getElementById('itemInput');
  const addBtn = document.getElementById('addBtn');
  const categoryTabs = document.getElementById('categoryTabs');
  const clearCheckedBtn = document.getElementById('clearCheckedBtn');

  function loadItems(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      return [];
    }
  }

  function saveItems(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function addItem(name, category){
    if(!name.trim()) return;
    items.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name: name.trim(),
      category: category || '食品',
      checked: false
    });
    saveItems();
    render();
  }

  function toggleItem(id){
    const it = items.find(i => i.id === id);
    if(it){ it.checked = !it.checked; saveItems(); render(); }
  }

  function deleteItem(id){
    items = items.filter(i => i.id !== id);
    saveItems();
    render();
  }

  function clearChecked(){
    items = items.filter(i => !i.checked);
    saveItems();
    render();
  }

  function renderCategoryTabs(){
    const cats = ['すべて', ...CATEGORIES];
    categoryTabs.innerHTML = cats.map(c =>
      `<div class="cat-chip ${c===activeCategory?'active':''}" data-cat="${c}">${c}</div>`
    ).join('');
    categoryTabs.querySelectorAll('.cat-chip').forEach(el=>{
      el.addEventListener('click', ()=>{
        activeCategory = el.dataset.cat;
        render();
      });
    });
  }

  function render(){
    renderCategoryTabs();
    const filtered = activeCategory === 'すべて'
      ? items
      : items.filter(i => i.category === activeCategory);

    if(filtered.length === 0){
      listEl.innerHTML = '';
      emptyMsg.style.display = 'block';
    } else {
      emptyMsg.style.display = 'none';
      listEl.innerHTML = filtered.map(i => `
        <li class="item ${i.checked?'checked':''}" data-id="${i.id}">
          <div class="checkbox" data-action="toggle">
            <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="item-name">${escapeHtml(i.name)}</div>
          <div class="item-cat">${escapeHtml(i.category)}</div>
          <button class="del-btn" data-action="delete">✕</button>
        </li>
      `).join('');
    }

    const remaining = items.filter(i=>!i.checked).length;
    countText.textContent = `${remaining}件 未購入 / 全${items.length}件`;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  listEl.addEventListener('click', (e)=>{
    const li = e.target.closest('li.item');
    if(!li) return;
    const id = li.dataset.id;
    const action = e.target.closest('[data-action]')?.dataset.action;
    if(action === 'delete'){
      deleteItem(id);
    } else {
      toggleItem(id);
    }
  });

  addBtn.addEventListener('click', ()=>{
    addItem(itemInput.value, '食品');
    itemInput.value = '';
    itemInput.focus();
  });

  itemInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){
      addItem(itemInput.value, '食品');
      itemInput.value = '';
    }
  });

  clearCheckedBtn.addEventListener('click', clearChecked);

  render();

  // Service worker registration for offline support
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }

  // Install prompt (Android/Chrome)
  let deferredPrompt;
  const installBanner = document.getElementById('installBanner');
  const installBtn = document.getElementById('installBtn');

  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredPrompt = e;
    installBanner.style.display = 'flex';
  });

  installBtn.addEventListener('click', async ()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBanner.style.display = 'none';
  });

  window.addEventListener('appinstalled', ()=>{
    installBanner.style.display = 'none';
  });
</script>
</body>
</html>
